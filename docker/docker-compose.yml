
services:
  mercio-runtime:
    build:
      context: ..
      dockerfile: docker/mercio-runtime/Dockerfile
    restart: unless-stopped
    env_file:
      - ../apps/mercio-runtime/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MERCIO_CACHE_DIR: /var/mercio
      WORKERD_BIN: /app/node_modules/workerd/bin/workerd
    volumes:
      - mercio_cache:/var/mercio
    depends_on:
      - redis
    networks:
      - merci

  postgres:
    image: postgres:alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mercy
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - merci

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - merci

volumes:
  postgres_data:
  redis_data:
  mercio_cache:

networks:
  merci:
    driver: bridge